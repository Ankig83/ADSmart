# Nginx site config (example)
#
# Put into: /etc/nginx/sites-available/adsmart.conf
# Symlink:  /etc/nginx/sites-enabled/adsmart.conf
#
server {
    listen 80;
    server_name example.com;

    client_max_body_size 20m;

    # Static (collected with collectstatic)
    location /static/ {
        alias /srv/adsmart/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Media (user uploads)
    location /media/ {
        alias /srv/adsmart/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://unix:/run/adsmart/gunicorn.sock;
    }
}



