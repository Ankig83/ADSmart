{# Params: label, variant=primary|secondary|ghost|outline|danger, size=sm|md|lg, href (optional). danger→secondary #}
{% with v=variant|default:"primary" s=size|default:"md" %}
  {% if href %}
    <a class="button button--{{ s }} button--{% if v == "danger" %}secondary{% else %}{{ v }}{% endif %} {{ class|default:'' }}" href="{{ href }}">
      {{ label }}
    </a>
  {% else %}
    <button
      class="button button--{{ s }} button--{% if v == "danger" %}secondary{% else %}{{ v }}{% endif %} {{ class|default:'' }}"
      type="{{ type|default:'button' }}"
      {% if disabled %}disabled{% endif %}
    >
      {{ label }}
    </button>
  {% endif %}
{% endwith %}
