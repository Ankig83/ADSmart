{% load static %}
{% comment %}Billboards page: Contact us (Ready--Copy component 140:5482; instance 140:5468){% endcomment %}

<section class="demo-billboards-contact" aria-labelledby="billboards-contact-title">
  <div class="demo-billboards-contact__inner">
    <h2 class="demo-billboards-contact__title" id="billboards-contact-title">
      Выберите точку доминирования в городе и начните диалог
    </h2>
    <p class="demo-billboards-contact__text">
      Получите полную адресную программу с локациями, стоимостью и примерами креативов
    </p>

    <form class="demo-billboards-contact__form" action="{% url 'submit_lead' %}" method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="source" value="billboards_contact" />
      <input type="hidden" name="next" value="{{ request.get_full_path }}" />

      <label class="demo-billboards-contact__field">
        <span class="sr-only">Телефон</span>
        <input class="demo-billboards-contact__input" type="tel" name="phone" placeholder=" " autocomplete="tel" required />
        <span class="demo-billboards-contact__ph" aria-hidden="true">Телефон</span>
      </label>

      <button class="demo-billboards-contact__btn" type="submit">Заказать</button>
    </form>
  </div>
</section>
