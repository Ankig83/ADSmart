{% load static %}
{% comment %}Transport page: Contact us (Ready--Copy instance 140:5548 / component 140:5482){% endcomment %}

<section class="demo-transport-contact" aria-labelledby="transport-contact-title">
  <div class="demo-transport-contact__inner">
    <h2 class="demo-transport-contact__title" id="transport-contact-title">
      Запустите движущуюся рекламную кампанию с умным диалогом
    </h2>
    <p class="demo-transport-contact__text">
      Получите консультацию по подбору маршрутов и расчет эффективности гибридной интеграции
    </p>

    <form class="demo-transport-contact__form" action="{% url 'submit_lead' %}" method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="source" value="transport_contact" />
      <input type="hidden" name="page" value="{{ request.get_full_path }}" />
      <input type="hidden" name="type" value="contact" />
      <input type="hidden" name="next" value="{{ request.get_full_path }}" />

      <label class="demo-transport-contact__field">
        <span class="sr-only">Телефон</span>
        <input class="demo-transport-contact__input" type="tel" name="phone" placeholder=" " autocomplete="tel" required />
        <span class="demo-transport-contact__ph" aria-hidden="true">Телефон</span>
      </label>

      <button class="button button--lg button--primary" type="submit">Заказать</button>
    </form>
  </div>
</section>
